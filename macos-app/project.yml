name: ViewFinityBrightnessControl
options:
  bundleIdPrefix: com.viewfinity
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "ViewFinityDev"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: true

targets:
  ViewFinityBrightnessControl:
    type: application
    platform: macOS
    sources:
      - path: ViewFinityBrightnessControl
        excludes:
          - "*.entitlements"
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.viewfinity.brightnesscontrol
        PRODUCT_NAME: ViewFinity Brightness Control
        INFOPLIST_FILE: ViewFinityBrightnessControl/Info.plist
        CODE_SIGN_ENTITLEMENTS: ViewFinityBrightnessControl/ViewFinityBrightnessControl.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: false
    entitlements:
      path: ViewFinityBrightnessControl/ViewFinityBrightnessControl.entitlements