name: UniDesk
options:
  bundleIdPrefix: com.ivomachado
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
    base:
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      CODE_SIGN_IDENTITY: "UniDeskDev"
      CODE_SIGN_STYLE: Manual
      ENABLE_HARDENED_RUNTIME: true

targets:
  UniDesk:
    type: application
    platform: macOS
    sources:
      - path: UniDesk
        excludes:
          - "*.entitlements"
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivomachado.unidesk
        PRODUCT_NAME: UniDesk
        INFOPLIST_FILE: UniDesk/Info.plist
        CODE_SIGN_ENTITLEMENTS: UniDesk/UniDesk.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: false
    entitlements:
      path: UniDesk/UniDesk.entitlements
